services:
  mysql:
    image: mysql:8.0
    env_file:
      - .env
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      # Default to 3307 on host to avoid conflicts with a local MySQL on 3306.
      # Override with MYSQL_PORT in root .env if you want a different host port.
      - "${MYSQL_PORT:-3307}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 30

  backend:
    image: golang:1.22
    working_dir: /app
    command: sh -lc "mkdir -p /tmp/gocache && env GOCACHE=/tmp/gocache go run ."
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - backend_gocache:/tmp/gocache
    ports:
      - "8080:8080"

  frontend:
    image: node:20
    working_dir: /app
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    env_file:
      - .env
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  backend_gocache: {}
  frontend_node_modules: {}
  mysql_data: {}
