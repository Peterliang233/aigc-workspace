services:
  mysql:
    image: mysql:8.0
    env_file:
      - .env
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      # Default to 3307 on host to avoid conflicts with a local MySQL on 3306.
      # Override with MYSQL_PORT in root .env if you want a different host port.
      - "${MYSQL_PORT:-3307}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 30

  minio:
    image: minio/minio:latest
    env_file:
      - .env
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"

  minio-init:
    image: minio/mc:latest
    env_file:
      - .env
    depends_on:
      - minio
    entrypoint: >
      sh -lc "
        for i in $(seq 1 60); do
          mc alias set local http://minio:9000 \"$MINIO_ROOT_USER\" \"$MINIO_ROOT_PASSWORD\" && break;
          sleep 1;
        done;
        mc mb -p local/\"$MINIO_BUCKET\" || true
      "

  backend:
    image: golang:1.23
    working_dir: /app
    command: sh -lc "mkdir -p /tmp/gocache && env GOCACHE=/tmp/gocache go run ."
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_started
      media-worker:
        condition: service_started
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - backend_gocache:/tmp/gocache
    ports:
      - "8080:8080"

  media-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.media-worker
    env_file:
      - .env
    ports:
      - "${MEDIA_WORKER_PORT:-8090}:8090"

  frontend:
    image: node:20
    working_dir: /app
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    env_file:
      - .env
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  backend_gocache: {}
  frontend_node_modules: {}
  mysql_data: {}
  minio_data: {}
