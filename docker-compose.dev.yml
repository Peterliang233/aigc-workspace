services:
  backend:
    image: golang:1.22
    working_dir: /app
    command: sh -lc "mkdir -p /tmp/gocache && env GOCACHE=/tmp/gocache go run ./cmd/server"
    environment:
      PORT: "8080"
      AIGC_PROVIDER: "mock"
      ALLOWED_ORIGINS: "http://localhost:5173"
    volumes:
      - ./backend:/app
      - backend_gocache:/tmp/gocache
    ports:
      - "8080:8080"

  frontend:
    image: node:20
    working_dir: /app
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  backend_gocache: {}
  frontend_node_modules: {}

